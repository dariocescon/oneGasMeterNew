# === Server TCP (disabilitato nei test) ===
tcp.server.port=0
tcp.server.max-connections=10
tcp.server.backlog=10
tcp.server.session-timeout-ms=5000

# === Server UDP (disabilitato nei test) ===
udp.server.port=0
udp.server.max-packet-size=2048
udp.server.retry-count=3
udp.server.retry-delay-ms=1000

# === Sessione DLMS ===
dlms.client-address=1
dlms.server-address=1
dlms.authentication=HIGH_GMAC
dlms.password=
dlms.use-logical-name-referencing=true

# === Sicurezza chiavi DLMS (password di test) ===
security.key-master-password=testMasterPassword123

# === H2 DataSource (persistito su file) ===
spring.datasource.url=jdbc:h2:file:./src/test/resources/db/testdb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# === JPA/Hibernate ===
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
